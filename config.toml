[theme]
# Główny kolor przycisków, suwaków i akcentów (Ciemny, profesjonalny niebieski / Navy)
primaryColor = "#004b87" 

# Kolor tła głównej części strony (Czysta biel)
backgroundColor = "#FFFFFF" 

# Kolor tła panelu bocznego (Bardzo delikatna, profesjonalna szarość)
secondaryBackgroundColor = "#F4F6F9" 

# Kolor tekstu (Ciemny grafit, łagodniejszy dla oczu niż czysta czerń)
textColor = "#1E293B" 

# Krój czcionki (Bezszeryfowy, nowoczesny font, używany na platformach B2B)
font = "sans serif"